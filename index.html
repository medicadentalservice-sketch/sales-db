<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0d0f12;
  --bg2:#13161b;
  --bg3:#1a1e25;
  --bg4:#21262f;
  --border:#2a2f3a;
  --border2:#363d4a;
  --text:#e8eaf0;
  --text2:#9aa0b0;
  --text3:#5a6070;
  --accent:#f0a500;
  --accent2:#e8951a;
  --green:#2ecc71;
  --red:#e74c3c;
  --blue:#3498db;
  --purple:#9b59b6;
  --radius:6px;
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;}
input,select,textarea{font-family:var(--font);font-size:13px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:7px 10px;width:100%;outline:none;transition:border .15s;}
input:focus,select:focus{border-color:var(--accent);}
button{font-family:var(--font);cursor:pointer;}
a{color:var(--accent);text-decoration:none;}

/* Layout */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg);position:relative;overflow:hidden;}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(240,165,0,.06) 0%,transparent 70%);}
.login-box{width:100%;max-width:380px;position:relative;z-index:1;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.login-logo-mark{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:#000;}
.login-title{font-size:22px;font-weight:600;letter-spacing:-.3px;}
.login-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.login-hint{font-size:11px;color:var(--text3);margin-top:20px;line-height:1.7;font-family:var(--mono);}
.login-error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#e74c3c;border-radius:var(--radius);padding:8px 12px;font-size:13px;margin-bottom:14px;display:none;}

#app-screen{display:none;min-height:100vh;flex-direction:column;}
#app-screen.visible{display:flex;}

/* Topbar */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#000;flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-family:var(--mono);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.syncing{background:var(--accent);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 6px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;}
.user-name{font-size:12px;font-weight:500;}
.user-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}

/* Main content */
.main{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto;}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.4;}
.metric-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.metric-value{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--text);letter-spacing:-.5px;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;}
.tab-btn{padding:7px 16px;border-radius:5px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);transition:all .15s;cursor:pointer;}
.tab-btn.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3);}
.tab-btn:hover:not(.active){color:var(--text);}

/* Table card */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{padding:9px 10px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:8px 10px;color:var(--text);vertical-align:top;}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;font-family:var(--mono);}
.b-open{background:rgba(240,165,0,.12);color:var(--accent);border:1px solid rgba(240,165,0,.2);}
.b-won{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2);}
.b-lost{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2);}
.b-follow{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.2);}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .15s;cursor:pointer;}
.btn:hover{background:var(--bg3);border-color:var(--border2);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-ghost{border:none;background:transparent;color:var(--text2);padding:4px 8px;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:600px){
  .main{padding:12px;}
  .topbar{padding:0 12px;}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">S</div>
      <div>
        <div class="login-title">Sales Portal</div>
        <div class="login-sub">Sign in to your account</div>
      </div>
    </div>
    <div class="login-card">
      <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
      <div class="login-field">
        <label>Select your name</label>
        <select id="l-user"></select>
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;" onclick="doLogin()">Sign in</button>
      <div class="login-hint" id="login-hint"></div>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">S</div>
      <div class="topbar-title">Sales Portal</div>
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Loading...</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-sm" onclick="loadFromSheet()" title="Refresh from sheet">↻ Sync</button>
      <div class="user-pill">
        <div class="user-avatar" id="top-avatar"></div>
        <div>
          <div class="user-name" id="top-name"></div>
          <div class="user-role" id="top-role"></div>
        </div>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="metrics" id="metrics-row"></div>
    <div class="tabs" id="tab-bar"></div>
    <div id="tab-content"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpIrq24zGnLPk1jxlBbyJzPtKy1mfJ4U_K9vZ3oayPD0ZZJUTrcvQ5u7mjUhZfjjy86g/exec";

const USERS = [
  { id:1, name:"Mohamed Agha",    role:"manager",    pass:"1243", initials:"MA" },
  { id:2, name:"Mohamed Hamdy",   role:"salesman",   pass:"2341", initials:"MH" },
  { id:3, name:"Mohamed Almech",  role:"salesman",   pass:"4123", initials:"ME" },
  { id:4, name:"Yahya Aldaour",   role:"salesman",   pass:"3241", initials:"YA" },
  { id:5, name:"Munadel Yassine", role:"salesman",   pass:"4321", initials:"MY" },
];

let leads = [];
let currentUser = null;
let activeTab = "leads";

// ─────────────────────────────────────────
// LOGIN LOGIC
// ─────────────────────────────────────────
function initLogin() {
  const sel = document.getElementById("l-user");
  USERS.forEach(u => {
    const opt = document.createElement("option");
    opt.value = u.id;
    opt.textContent = u.name;
    sel.appendChild(opt);
  });
  
  // Update hint with new passwords
  const hint = document.getElementById("login-hint");
  hint.innerHTML = USERS.map(u => `${u.name}: ${u.pass}`).join("<br/>");
}

function doLogin() {
  const uid = parseInt(document.getElementById("l-user").value);
  const pass = document.getElementById("l-pass").value;
  const user = USERS.find(u => u.id === uid && u.pass === pass);
  const errEl = document.getElementById("login-error");
  
  if (!user) { 
    errEl.style.display = "block"; 
    return; 
  }
  
  errEl.style.display = "none";
  currentUser = user;
  
  document.getElementById("top-avatar").textContent = user.initials;
  document.getElementById("top-name").textContent = user.name;
  document.getElementById("top-role").textContent = user.role.toUpperCase();
  
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").classList.add("visible");
  
  loadFromSheet();
}

function signOut() {
  currentUser = null;
  document.getElementById("app-screen").classList.remove("visible");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("l-pass").value = "";
}

// ─────────────────────────────────────────
// APP LOGIC
// ─────────────────────────────────────────
async function loadFromSheet() {
  const dot = document.getElementById("sync-dot");
  const lbl = document.getElementById("sync-label");
  dot.classList.add("syncing");
  lbl.textContent = "Syncing...";
  
  try {
    const res = await fetch(SCRIPT_URL + "?action=get");
    const raw = await res.json();
    leads = raw; 
    lbl.textContent = "Synced " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  } catch(e) {
    lbl.textContent = "Offline Mode";
  } finally {
    dot.classList.remove("syncing");
    renderApp();
  }
}

function renderApp() {
  renderMetrics();
  renderTabBar();
  renderTabContent();
}

function renderMetrics() {
  const myLeads = currentUser.role === "manager" ? leads : leads.filter(l => l.salesman === currentUser.name);
  const total = myLeads.length;
  const won = myLeads.filter(l => (l.nextAction || "").toLowerCase().includes("won")).length;
  
  document.getElementById("metrics-row").innerHTML = `
    <div class="metric-card"><div class="metric-label">Total Accounts</div><div class="metric-value">${total}</div></div>
    <div class="metric-card"><div class="metric-label">Pipeline Won</div><div class="metric-value">${won}</div></div>
  `;
}

function renderTabBar() {
  const tabs = [
    { id:"leads", label:"Accounts" },
    { id:"charts", label:"Analytics" }
  ];
  document.getElementById("tab-bar").innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeTab===t.id?"active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join("");
}

function switchTab(t) { activeTab = t; renderApp(); }

function renderTabContent() {
  const el = document.getElementById("tab-content");
  if (activeTab === "leads") {
    const myLeads = currentUser.role === "manager" ? leads : leads.filter(l => l.salesman === currentUser.name);
    let html = `<div class="table-card"><div class="table-wrap"><table><thead><tr>
      <th>Account</th><th>Location</th><th>Product</th><th>Status</th><th>By</th>
    </tr></thead><tbody>`;
    
    myLeads.forEach(l => {
      html += `<tr>
        <td>${l.name || l["Account Name"] || "-"}</td>
        <td>${l.location || l.Location || "-"}</td>
        <td>${l.mainProduct || l["The main product of the visit"] || "-"}</td>
        <td><span class="badge b-follow">${l.nextAction || "Open"}</span></td>
        <td>${l.salesman || "-"}</td>
      </tr>`;
    });
    
    html += `</tbody></table></div></div>`;
    el.innerHTML = html;
  } else {
    el.innerHTML = `<div class="metric-card" style="text-align:center;padding:40px;">Select Accounts tab to view data.</div>`;
  }
}

initLogin();
</script>
</body>
</html>
