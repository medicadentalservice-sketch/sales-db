<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0d0f12;
  --bg2:#13161b;
  --bg3:#1a1e25;
  --bg4:#21262f;
  --border:#2a2f3a;
  --border2:#363d4a;
  --text:#e8eaf0;
  --text2:#9aa0b0;
  --text3:#5a6070;
  --accent:#f0a500;
  --accent2:#e8951a;
  --green:#2ecc71;
  --red:#e74c3c;
  --blue:#3498db;
  --purple:#9b59b6;
  --radius:6px;
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;}
input,select,textarea{font-family:var(--font);font-size:13px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:7px 10px;width:100%;outline:none;transition:border .15s;}
input:focus,select:focus{border-color:var(--accent);}
button{font-family:var(--font);cursor:pointer;}
a{color:var(--accent);text-decoration:none;}

/* Layout */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg);position:relative;overflow:hidden;}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(240,165,0,.06) 0%,transparent 70%);}
.login-box{width:100%;max-width:380px;position:relative;z-index:1;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.login-logo-mark{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:#000;}
.login-title{font-size:22px;font-weight:600;letter-spacing:-.3px;}
.login-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.login-hint{font-size:11px;color:var(--text3);margin-top:20px;line-height:1.7;font-family:var(--mono);}
.login-error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#e74c3c;border-radius:var(--radius);padding:8px 12px;font-size:13px;margin-bottom:14px;display:none;}

#app-screen{display:none;min-height:100vh;flex-direction:column;}
#app-screen.visible{display:flex;}

/* Topbar */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#000;flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-family:var(--mono);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.syncing{background:var(--accent);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 6px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;}
.user-name{font-size:12px;font-weight:500;}
.user-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}

/* Main content */
.main{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto;}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.4;}
.metric-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.metric-value{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--text);letter-spacing:-.5px;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;}
.tab-btn{padding:7px 16px;border-radius:5px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);transition:all .15s;cursor:pointer;}
.tab-btn.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3);}
.tab-btn:hover:not(.active){color:var(--text);}

/* Save message */
.save-msg{padding:9px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px;border:1px solid;display:none;}
.save-msg.success{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.3);color:var(--green);}
.save-msg.error{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.3);color:var(--red);}

/* Table card */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.table-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.filter-count{font-size:12px;color:var(--text2);font-family:var(--mono);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{padding:9px 10px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:top;}
thead th .col-head{display:block;margin-bottom:5px;}
thead th input,thead th select{font-size:11px;padding:4px 6px;background:var(--bg3);border-color:var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:8px 10px;color:var(--text);vertical-align:top;}
.td-wrap{white-space:normal;word-break:break-word;}
.td-nowrap{white-space:nowrap;}
.empty-row td{text-align:center;padding:40px;color:var(--text3);}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;font-family:var(--mono);}
.b-open{background:rgba(240,165,0,.12);color:var(--accent);border:1px solid rgba(240,165,0,.2);}
.b-won{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2);}
.b-lost{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2);}
.b-follow{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.2);}
.b-new{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2);}
.b-old{background:rgba(90,96,112,.1);color:var(--text2);border:1px solid var(--border);}
.b-sheet{background:rgba(46,204,113,.08);color:#27ae60;border:1px solid rgba(46,204,113,.15);font-size:10px;padding:1px 5px;}
.b-new-entry{background:rgba(52,152,219,.08);color:var(--blue);border:1px solid rgba(52,152,219,.15);font-size:10px;padding:1px 5px;}

/* Pills */
.brand-pill{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;background:var(--bg4);color:var(--text2);border:1px solid var(--border2);margin:1px;}
.city-pill{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.15);margin-top:2px;}
.prod-pill{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;background:rgba(155,89,182,.1);color:var(--purple);border:1px solid rgba(155,89,182,.15);margin-top:2px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .15s;cursor:pointer;}
.btn:hover{background:var(--bg3);border-color:var(--border2);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger{color:var(--red);border-color:rgba(231,76,60,.3);}
.btn-danger:hover{background:rgba(231,76,60,.08);}
.btn-ghost{border:none;background:transparent;color:var(--text2);padding:4px 8px;}
.btn-ghost:hover{color:var(--text);}

/* Form */
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;}
.form-title{font-size:15px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-full{grid-column:1/-1;}
.form-label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;font-weight:500;}
.city-hint{font-size:11px;color:var(--blue);margin-top:4px;min-height:14px;font-family:var(--mono);}
.brand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);}
.brand-check{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text);cursor:pointer;}
.brand-check input[type=checkbox]{width:14px;height:14px;flex-shrink:0;accent-color:var(--accent);}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;}
.chart-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.chart-sub{font-size:11px;color:var(--text3);margin-bottom:12px;}
.chart-wrap{position:relative;width:100%;}

/* Team table */
.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.team-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;}

/* Salesman badge */
.sal-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);font-size:10px;font-weight:600;color:var(--text2);}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* Mobile */
@media(max-width:600px){
  .main{padding:12px;}
  .form-grid{grid-template-columns:1fr;}
  .topbar{padding:0 12px;}
  .tabs{overflow-x:auto;}
  .tab-btn{white-space:nowrap;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">S</div>
      <div>
        <div class="login-title">Sales Portal</div>
        <div class="login-sub">Sign in to your account</div>
      </div>
    </div>
    <div class="login-card">
      <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
      <div class="login-field">
        <label>Select your name</label>
        <select id="l-user"></select>
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;" onclick="doLogin()">Sign in</button>
      <div class="login-hint" id="login-hint"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">S</div>
      <div class="topbar-title">Sales Portal</div>
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Loading...</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-sm" onclick="loadFromSheet()" title="Refresh from sheet">↻ Sync</button>
      <div class="user-pill">
        <div class="user-avatar" id="top-avatar"></div>
        <div>
          <div class="user-name" id="top-name"></div>
          <div class="user-role" id="top-role"></div>
        </div>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="metrics" id="metrics-row"></div>
    <div class="save-msg" id="save-msg"></div>
    <div class="tabs" id="tab-bar"></div>
    <div id="tab-content"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpIrq24zGnLPk1jxlBbyJzPtKy1mfJ4U_K9vZ3oayPD0ZZJUTrcvQ5u7mjUhZfjjy86g/exec";

const USERS = [
  { id:1, name:"Mohamed Agha",    role:"manager",   pass:"1243",   initials:"MA" },
  { id:2, name:"Mohamed Hamdy",   role:"salesman",  pass:"2341",  initials:"MH" },
  { id:3, name:"Mohamed Almech",  role:"salesman",  pass:"4123", initials:"ME" },
  { id:4, name:"Yahya Aldaour",   role:"salesman",  pass:"3241",  initials:"YA" },
  { id:5, name:"Munadel Yassine", role:"salesman",  pass:"4321",initials:"MY" },
];

const BRANDS = ["CJ Optic","Bisco","Planmeca","Mectron","Euronda","Swident","Loran","MGF"];
const SOURCES = ["Visit","Media","Website","Other"];
const STATUSES = ["Open","Follow Up","Closed Won","Closed Lost"];

// ─────────────────────────────────────────
// FUZZY MAPS
// ─────────────────────────────────────────
const CITY_MAP = [
  { canonical:"Riyadh",   variants:["riyadh","الرياض","riyad","ryadh","ryad","riyadh "] },
  { canonical:"Jeddah",   variants:["jeddah","جدة","jedda","jidda","jiddah","جده","jeda","جدة "] },
  { canonical:"Dammam",   variants:["dammam","الدمام","damam","daman"] },
  { canonical:"Khobar",   variants:["khobar","الخبر","al khobar","alkhobar"] },
  { canonical:"Mecca",    variants:["mecca","مكة","makkah","makka","مكه"] },
  { canonical:"Medina",   variants:["medina","المدينة","المدينه","madinah","madina","المدينة المنورة"] },
  { canonical:"Taif",     variants:["taif","الطائف","الطايف","ta'if","taef","طايف","طائف"] },
  { canonical:"Abha",     variants:["abha","أبها","ابها"] },
  { canonical:"Tabuk",    variants:["tabuk","تبوك"] },
  { canonical:"Buraidah", variants:["buraidah","بريدة","buraydah"] },
  { canonical:"Hail",     variants:["hail","حائل","حايل"] },
  { canonical:"Najran",   variants:["najran","نجران"] },
  { canonical:"Jizan",    variants:["jizan","جازان","jazan"] },
  { canonical:"Yanbu",    variants:["yanbu","ينبع"] },
  { canonical:"Qassim",   variants:["qassim","القصيم","al qassim"] },
  { canonical:"Africa",   variants:["africa","africa ","أفريقيا","افريقيا"] },
];

const PRODUCT_MAP = [
  { canonical:"Planmeca",   variants:["planmeca","plenmeca","planmeca unit","romexis","promax","planmeca promax","flexion","planmeca flexion","romexis "] },
  { canonical:"CJ Optic",   variants:["cj optic","cj optik","cj optical","cj-optic","cjoptic","zomax","zomax win","core build","core b","cj optic lost"] },
  { canonical:"Bisco",      variants:["bisco","bisco samples","our bisco stock arrived","bisco stock","theracal","thera cal","cure build up","cure bu","core build up","our bisco stock arrived "] },
  { canonical:"Mectron",    variants:["mectron","mectron intro.","mectron intro","mectron introduction","piezo","piezoo","peizo","piezo surgery"] },
  { canonical:"Euronda",    variants:["euronda"] },
  { canonical:"Swident",    variants:["swident","swident chair","swident unit"] },
  { canonical:"Loran",      variants:["loran","cabinet","cabinets","loran cabinet"] },
  { canonical:"MGF",        variants:["mgf"] },
  { canonical:"Training",   variants:["training","training online","online training"] },
  { canonical:"Follow up",  variants:["follow up","follow up ","follow-up","followup","متابعة","فولو اب"] },
  { canonical:"Quotation",  variants:["quotation","send a quotation","عرض سعر","price offer","send quotation","quote"] },
  { canonical:"Samples",    variants:["samples","sample delivery","samples delivery","samples requested","sample"] },
  { canonical:"New client", variants:["new client","to approach a new client","approach new client","introduce","introduction","intro","to approach a new client ant introduce our portfolio."] },
  { canonical:"PO",         variants:["po","purchase order"] },
];

function normalizeCity(raw) {
  if (!raw || !raw.trim()) return "Other";
  const parts = raw.split(/[-,\/،]/);
  const cp = (parts[0] || raw).trim().toLowerCase().replace(/\s+/g, " ");
  for (const c of CITY_MAP) {
    if (c.variants.includes(cp)) return c.canonical;
    for (const v of c.variants) { if (cp === v || cp.startsWith(v + " ") || v.startsWith(cp)) return c.canonical; }
  }
  return (cp.charAt(0).toUpperCase() + cp.slice(1)) || "Other";
}

function normalizeProduct(raw) {
  if (!raw || !raw.trim()) return "Other";
  const lower = raw.toLowerCase().trim();
  for (const p of PRODUCT_MAP) {
    if (p.variants.includes(lower)) return p.canonical;
    for (const v of p.variants) { if (lower.includes(v) || v.includes(lower)) return p.canonical; }
  }
  for (const b of BRANDS) { if (lower.includes(b.toLowerCase())) return b; }
  return (lower.charAt(0).toUpperCase() + lower.slice(1)) || "Other";
}

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let leads = [];
let nextId = 5000;
let currentUser = null;
let editingId = null;
let activeTab = "leads";
let syncing = false;
let lastSync = null;
let saveMsg = { text: "", type: "" };
let filters = { name:"", location:"", clientStatus:"", brands:"", mainProduct:"", nextAction:"", status:"", salesman:"" };

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function parseBrands(str) { return str ? str.split(",").map(s => s.trim()).filter(Boolean) : []; }
function uidFromName(name) {
  if (!name || !name.trim()) return 2;
  const n = name.trim().toLowerCase();
  // Try exact match first
  let u = USERS.find(u => u.name.toLowerCase() === n);
  if (u) return u.id;
  // Try first name match
  const first = n.split(" ")[0];
  // For "Mohamed X" names, match on second word to avoid all mapping to first Mohamed
  const parts = n.split(" ");
  if (parts.length > 1) {
    const second = parts[1];
    u = USERS.find(u => u.name.toLowerCase().includes(second));
    if (u) return u.id;
  }
  u = USERS.find(u => u.name.toLowerCase().includes(first));
  return u ? u.id : 2;
}
function inferStatus(next) {
  const t = (next || "").toLowerCase();
  if (t.includes("follow up") || t.includes("متابعة")) return "Follow Up";
  if (t.includes("closed") || t.includes("won")) return "Closed Won";
  if (t.includes("lost")) return "Closed Lost";
  return "Open";
}
function parseSheetDate(str) {
  if (!str) return new Date().toISOString().split("T")[0];
  const m = str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return `${m[3]}-${m[2]}-${m[1]}`;
  try { return new Date(str).toISOString().split("T")[0]; } catch(e) { return ""; }
}
function initials(name) { return name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase(); }
function getMyLeads() { return currentUser.role === "manager" ? leads : leads.filter(l => l.uid === currentUser.id); }
function applyFilters() {
  return leads.filter(l => {
    if (currentUser.role !== "manager" && l.uid !== currentUser.id) return false;
    if (filters.name && !l.name.toLowerCase().includes(filters.name.toLowerCase())) return false;
    if (filters.location && normalizeCity(l.location).toLowerCase() !== filters.location.toLowerCase()) return false;
    if (filters.clientStatus && l.clientStatus !== filters.clientStatus) return false;
    if (filters.brands && !(l.brands || []).includes(filters.brands)) return false;
    if (filters.mainProduct && normalizeProduct(l.mainProduct).toLowerCase() !== filters.mainProduct.toLowerCase()) return false;
    if (filters.nextAction && !l.nextAction.toLowerCase().includes(filters.nextAction.toLowerCase())) return false;
    if (filters.status && l.status !== filters.status) return false;
    if (filters.salesman && l.uid !== parseInt(filters.salesman)) return false;
    return true;
  });
}
function metrics(data) {
  const total = data.length;
  const won = data.filter(l => l.status === "Closed Won").length;
  const rev = data.filter(l => l.status === "Closed Won").reduce((s,l) => s + Number(l.value||0), 0);
  const open = data.filter(l => l.status === "Open" || l.status === "Follow Up").length;
  const rate = total ? Math.round(won/total*100) : 0;
  const avg = won ? Math.round(rev/won) : 0;
  return { total, won, rev, open, rate, avg };
}
function badgeClass(s) { return s==="Open"?"b-open":s==="Closed Won"?"b-won":s==="Closed Lost"?"b-lost":"b-follow"; }
function getCityCounts(data) {
  const map = {};
  data.forEach(l => { const c = normalizeCity(l.location); map[c] = (map[c]||0)+1; });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}
function getProductCounts(data) {
  const map = {};
  data.forEach(l => { const p = normalizeProduct(l.mainProduct); map[p] = (map[p]||0)+1; });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}
function showSaveMsg(text, type) {
  const el = document.getElementById("save-msg");
  if (!el) return;
  el.textContent = text;
  el.className = "save-msg " + type;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 3500);
}
function setSyncState(state, label) {
  const dot = document.getElementById("sync-dot");
  const lbl = document.getElementById("sync-label");
  if (dot) dot.className = "sync-dot" + (state === "syncing" ? " syncing" : "");
  if (lbl) lbl.textContent = label;
}

async function loadFromSheet() {
  setSyncState("syncing", "Syncing...");
  try {
    const res = await fetch(SCRIPT_URL + "?action=get");
    const raw = await res.json();
    leads = raw.map((r, i) => ({
      id: 2000 + i,
      uid: uidFromName(r.salesman || r.Name || r.name),
      name: (r.name || r["Account Name"] || "").trim(),
      phone: "",
      source: "Visit",
      location: (r.location || r.Location || "").trim(),
      opened: parseSheetDate(r.timestamp || r.Timestamp || ""),
      closed: "",
      value: 0,
      status: inferStatus(r.nextAction || r["Next Action?"] || ""),
      brands: parseBrands(r.brands || r.Brands || ""),
      clientStatus: (r.clientStatus || r["Client Status"] || "Old").trim(),
      mainProduct: (r.mainProduct || r["The main product of the visit"] || "").trim(),
      nextAction: (r.nextAction || r["Next Action?"] || "").trim(),
      contact: (r.contact || r["Contact Information"] || "").trim(),
      notes: "",
      imported: true,
      timestamp: r.timestamp || r.Timestamp || ""
    }));
    nextId = 2000 + leads.length + 1;
    lastSync = new Date();
    setSyncState("ok", "Synced " + lastSync.toLocaleTimeString());
  } catch(e) {
    setSyncState("err", "Offline — using local data");
    if (leads.length === 0) loadFallbackData();
  }
  renderApp();
}

async function saveToSheet(action, data) {
  setSyncState("syncing", "Saving...");
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action, ...data }),
      headers: { "Content-Type": "application/json" }
    });
    lastSync = new Date();
    setSyncState("ok", "Saved " + lastSync.toLocaleTimeString());
    showSaveMsg("✓ Saved to Google Sheet", "success");
  } catch(e) {
    setSyncState("err", "Saved locally only");
    showSaveMsg("⚠ Saved locally — sheet unreachable", "error");
  }
}

function initLogin() {
  const sel = document.getElementById("l-user");
  USERS.forEach(u => {
    const opt = document.createElement("option");
    opt.value = u.id;
    opt.textContent = u.name + (u.role === "manager" ? " (Manager)" : "");
    sel.appendChild(opt);
  });
  const hint = document.getElementById("login-hint");
  hint.textContent = "Contact your manager if you forgot your password.";
}

function doLogin() {
  const uid = parseInt(document.getElementById("l-user").value);
  const pass = document.getElementById("l-pass").value;
  const user = USERS.find(u => u.id === uid && u.pass === pass);
  const errEl = document.getElementById("login-error");
  if (!user) { errEl.style.display = "block"; return; }
  errEl.style.display = "none";
  currentUser = user;
  activeTab = "leads";
  editingId = null;
  filters = { name:"", location:"", clientStatus:"", brands:"", mainProduct:"", nextAction:"", status:"", salesman:"" };

  // Set topbar user info
  document.getElementById("top-avatar").textContent = user.initials;
  document.getElementById("top-name").textContent = user.name;
  document.getElementById("top-role").textContent = user.role === "manager" ? "Manager" : "Salesman";

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").classList.add("visible");

  setSyncState("syncing", "Loading...");
  loadFromSheet();
}

function signOut() {
  currentUser = null;
  leads = [];
  document.getElementById("app-screen").classList.remove("visible");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("l-pass").value = "";
}

// Chart selection state — null = no filter active for that dimension
let chartSel = { city:null, product:null, brand:null, status:null, clientStatus:null, source:null };
let chartInstances = {};

function chartFilteredLeads() {
  return getMyLeads().filter(l => {
    if (chartSel.city      && normalizeCity(l.location)    !== chartSel.city)      return false;
    if (chartSel.product   && normalizeProduct(l.mainProduct) !== chartSel.product) return false;
    if (chartSel.brand     && !(l.brands||[]).includes(chartSel.brand))            return false;
    if (chartSel.status    && l.status                     !== chartSel.status)     return false;
    if (chartSel.clientStatus && l.clientStatus            !== chartSel.clientStatus) return false;
    if (chartSel.source    && l.source                     !== chartSel.source)     return false;
    return true;
  });
}

function toggleChartSel(dim, val) {
  chartSel[dim] = chartSel[dim] === val ? null : val;
  refreshAllCharts();
  refreshChartFilterBar();
}

function clearChartFilters() {
  chartSel = { city:null, product:null, brand:null, status:null, clientStatus:null, source:null };
  refreshAllCharts();
  refreshChartFilterBar();
}

function refreshChartFilterBar() {
  const active = Object.entries(chartSel).filter(([,v]) => v !== null);
  const bar = document.getElementById("chart-filter-bar");
  if (!bar) return;
  if (active.length === 0) { bar.style.display = "none"; return; }
  bar.style.display = "flex";
  const d = chartFilteredLeads();
  bar.innerHTML = `
    <span style="font-size:12px;color:var(--text2);">${d.length} account${d.length!==1?"s":""} selected</span>
    ${active.map(([dim,val]) => `
      <span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;" onclick="toggleChartSel('${dim}','${val.replace(/'/g,"\\'")}')">
        ${val} <span style="color:var(--text3);margin-left:2px;">✕</span>
      </span>`).join("")}
    <button class="btn btn-sm btn-danger" style="margin-left:auto;" onclick="clearChartFilters()">Clear all</button>`;
}

function refreshAllCharts() {
  const d = chartFilteredLeads();
  const clrs = ["#3498db","#2ecc71","#f0a500","#e74c3c","#9b59b6","#1abc9c","#e67e22","#34495e","#e91e63","#00bcd4","#8bc34a","#ff5722"];
  const dimAlpha = (dim, label, base) => chartSel[dim] === null ? base : chartSel[dim] === label ? base : base + "55";

  // City
  if (chartInstances.city) {
    const cc = getCityCounts(d);
    const all = getCityCounts(getMyLeads());
    chartInstances.city.data.labels = all.map(x=>x[0]);
    chartInstances.city.data.datasets[0].data = all.map(x => {
      const found = cc.find(c=>c[0]===x[0]); return found ? found[1] : 0;
    });
    chartInstances.city.data.datasets[0].backgroundColor = all.map((x,i) => dimAlpha("city", x[0], clrs[i%clrs.length]));
    chartInstances.city.update();
  }

  // Product
  if (chartInstances.prod) {
    const pc = getProductCounts(d);
    const allP = getProductCounts(getMyLeads());
    chartInstances.prod.data.labels = allP.map(x=>x[0]);
    chartInstances.prod.data.datasets[0].data = allP.map(x => {
      const found = pc.find(c=>c[0]===x[0]); return found ? found[1] : 0;
    });
    chartInstances.prod.data.datasets[0].backgroundColor = allP.map((x,i) => dimAlpha("product", x[0], clrs[i%clrs.length]));
    chartInstances.prod.update();
  }

  // Brand
  if (chartInstances.brand) {
    chartInstances.brand.data.datasets[0].data = BRANDS.map(b => d.filter(l=>(l.brands||[]).includes(b)).length);
    chartInstances.brand.data.datasets[0].backgroundColor = BRANDS.map(b => dimAlpha("brand", b, "#f0a500"));
    chartInstances.brand.update();
  }

  // Status
  if (chartInstances.status) {
    chartInstances.status.data.datasets[0].data = STATUSES.map(s => d.filter(l=>l.status===s).length);
    const statusClrs = ["#f0a500","#3498db","#2ecc71","#e74c3c"];
    chartInstances.status.data.datasets[0].backgroundColor = STATUSES.map((s,i) => dimAlpha("status", s, statusClrs[i]));
    chartInstances.status.update();
  }

  // New/Old
  if (chartInstances.newold) {
    const newCount = d.filter(l=>l.clientStatus==="New").length;
    const oldCount = d.filter(l=>l.clientStatus==="Old").length;
    chartInstances.newold.data.datasets[0].data = [newCount, oldCount];
    chartInstances.newold.data.datasets[0].backgroundColor = [
      dimAlpha("clientStatus","New","#2ecc71"),
      dimAlpha("clientStatus","Old","#34495e")
    ];
    chartInstances.newold.update();
  }

  // Source
  if (chartInstances.source) {
    const srcClrs = ["#3498db","#9b59b6","#1abc9c","#34495e"];
    chartInstances.source.data.datasets[0].data = SOURCES.map(s=>d.filter(l=>l.source===s).length);
    chartInstances.source.data.datasets[0].backgroundColor = SOURCES.map((s,i) => dimAlpha("source", s, srcClrs[i]));
    chartInstances.source.update();
  }
}

function renderCharts() {
  chartInstances = {};
  const d = getMyLeads();
  const cc = getCityCounts(d);
  const pc = getProductCounts(d);
  const clrs = ["#3498db","#2ecc71","#f0a500","#e74c3c","#9b59b6","#1abc9c","#e67e22","#34495e","#e91e63","#00bcd4","#8bc34a","#ff5722"];

  const barOpts = (indexAxis, onClickFn) => ({
    indexAxis,
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx => ` ${ctx.parsed[indexAxis==="y"?"x":"y"]} accounts` } } },
    scales:{
      x:{ beginAtZero:true, ticks:{ color:"#5a6070", font:{size:11} }, grid:{ color:"rgba(255,255,255,.04)" } },
      y:{ ticks:{ color:"#5a6070", font:{size:11} }, grid:{ display:false } }
    },
    onClick: onClickFn,
    onHover: (e, el) => { e.native.target.style.cursor = el.length ? "pointer" : "default"; }
  });

  const doughnutOpts = (onClickFn) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ position:"bottom", labels:{ color:"#9aa0b0", font:{size:12}, padding:16 } }, tooltip:{ callbacks:{ label: ctx => ` ${ctx.label}: ${ctx.parsed} accounts` } } },
    onClick: onClickFn,
    onHover: (e, el) => { e.native.target.style.cursor = el.length ? "pointer" : "default"; }
  });

  // City chart
  chartInstances.city = new Chart(document.getElementById("chart-city"), {
    type:"bar",
    data:{ labels:cc.map(x=>x[0]), datasets:[{ data:cc.map(x=>x[1]), backgroundColor:cc.map((_,i)=>clrs[i%clrs.length]), borderRadius:4 }] },
    options: barOpts("y", (evt, els) => {
      if (!els.length) return;
      const label = chartInstances.city.data.labels[els[0].index];
      toggleChartSel("city", label);
    })
  });

  // Product chart
  chartInstances.prod = new Chart(document.getElementById("chart-prod"), {
    type:"bar",
    data:{ labels:pc.map(x=>x[0]), datasets:[{ data:pc.map(x=>x[1]), backgroundColor:pc.map((_,i)=>clrs[i%clrs.length]), borderRadius:4 }] },
    options: barOpts("y", (evt, els) => {
      if (!els.length) return;
      const label = chartInstances.prod.data.labels[els[0].index];
      toggleChartSel("product", label);
    })
  });

  // Brand chart
  chartInstances.brand = new Chart(document.getElementById("chart-brand"), {
    type:"bar",
    data:{ labels:BRANDS, datasets:[{ data:BRANDS.map(b=>d.filter(l=>(l.brands||[]).includes(b)).length), backgroundColor:"#f0a500", borderRadius:4 }] },
    options: barOpts("y", (evt, els) => {
      if (!els.length) return;
      const label = chartInstances.brand.data.labels[els[0].index];
      toggleChartSel("brand", label);
    })
  });

  // Status chart
  chartInstances.status = new Chart(document.getElementById("chart-status"), {
    type:"bar",
    data:{ labels:STATUSES, datasets:[{ data:STATUSES.map(s=>d.filter(l=>l.status===s).length), backgroundColor:["#f0a500","#3498db","#2ecc71","#e74c3c"], borderRadius:4 }] },
    options: barOpts("x", (evt, els) => {
      if (!els.length) return;
      const label = chartInstances.status.data.labels[els[0].index];
      toggleChartSel("status", label);
    })
  });

  // New/Old chart
  chartInstances.newold = new Chart(document.getElementById("chart-newold"), {
    type:"doughnut",
    data:{ labels:["New","Old"], datasets:[{ data:[d.filter(l=>l.clientStatus==="New").length, d.filter(l=>l.clientStatus==="Old").length], backgroundColor:["#2ecc71","#34495e"], borderWidth:0 }] },
    options: doughnutOpts((evt, els) => {
      if (!els.length) return;
      const label = chartInstances.newold.data.labels[els[0].index];
      toggleChartSel("clientStatus", label);
    })
  });

  // Source chart
  chartInstances.source = new Chart(document.getElementById("chart-source"), {
    type:"doughnut",
    data:{ labels:SOURCES, datasets:[{ data:SOURCES.map(s=>d.filter(l=>l.source===s).length), backgroundColor:["#3498db","#9b59b6","#1abc9c","#34495e"], borderWidth:0 }] },
    options: doughnutOpts((evt, els) => {
      if (!els.length) return;
      const label = chartInstances.source.data.labels[els[0].index];
      toggleChartSel("source", label);
    })
  });
}

function switchTab(t) { activeTab = t; if (t !== "add") editingId = null; renderApp(); }
function startEdit(id) { editingId = id; activeTab = "add"; renderApp(); }
function cancelEdit() { editingId = null; activeTab = "leads"; renderApp(); }
function setFilter(key, val) { filters[key] = val; renderApp(); }
function clearFilters() { filters = { name:"", location:"", clientStatus:"", brands:"", mainProduct:"", nextAction:"", status:"", salesman:"" }; renderApp(); }

function previewCity(val) {
  const el = document.getElementById("city-hint");
  if (!el) return;
  if (!val.trim()) { el.textContent = ""; return; }
  const norm = normalizeCity(val);
  const known = CITY_MAP.some(c => c.canonical === norm);
  el.textContent = known ? `→ Will group as: ${norm}` : "";
}

async function saveLead() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("Account name is required"); return; }
  const checked = Array.from(document.querySelectorAll(".brand-check input:checked")).map(i => i.value);
  const uid = editingId ? leads.find(l => l.id === editingId).uid : currentUser.id;
  const salesman = USERS.find(u => u.id === uid);
  const data = {
    name,
    phone: document.getElementById("f-phone").value.trim(),
    source: document.getElementById("f-source").value,
    location: document.getElementById("f-location").value.trim(),
    opened: document.getElementById("f-opened").value,
    value: document.getElementById("f-value").value,
    status: document.getElementById("f-status").value,
    clientStatus: document.getElementById("f-cstatus").value,
    brands: checked,
    mainProduct: document.getElementById("f-mainprod").value.trim(),
    nextAction: document.getElementById("f-nextaction").value.trim(),
    contact: document.getElementById("f-contact").value.trim(),
    notes: document.getElementById("f-notes").value.trim(),
    uid,
    salesman: salesman ? salesman.name : "",
    imported: false
  };
  if (editingId) {
    const idx = leads.findIndex(l => l.id === editingId);
    const ts = leads[idx].timestamp || "";
    leads[idx] = { ...leads[idx], ...data };
    editingId = null;
    await saveToSheet("edit", { ...data, timestamp: ts, brands: checked.join(", ") });
  } else {
    leads.push({ id: nextId++, closed: "", timestamp: "", ...data });
    await saveToSheet("add", { ...data, brands: checked.join(", ") });
  }
  activeTab = "leads";
  renderApp();
}

async function deleteLead(id) {
  if (!confirm("Remove this account?")) return;
  leads = leads.filter(l => l.id !== id);
  renderApp();
}
