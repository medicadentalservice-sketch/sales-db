<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Command Center | Brand Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c23; --border: #ffffff0f;
    --accent: #ffb703; --text: #f0f2f7; --muted: #6b7280;
    --new-color: #4d9fff; --old-color: #f0b429;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .container { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:40px 24px; }
  
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  .logo-area h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
  .logo-area span { color: var(--accent); }

  /* Brand Analysis Section */
  .analysis-section { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 28px; }
  @media(max-width: 900px) { .analysis-section { grid-template-columns: 1fr; } }
  
  .analysis-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .analysis-title { font-family: 'Syne'; font-size: 14px; text-transform: uppercase; margin-bottom: 20px; color: var(--accent); letter-spacing: 1px; }
  
  .brand-row { margin-bottom: 12px; }
  .brand-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
  .brand-bar-bg { background: var(--surface2); height: 6px; border-radius: 10px; overflow: hidden; }
  .brand-bar-fill { background: var(--accent); height: 100%; border-radius: 10px; transition: width 0.8s ease-in-out; }

  /* Team & Stats */
  .team-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:28px; }
  .rep-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition: 0.2s; }
  .rep-card.active { border-color: #fff; background: var(--surface2); }
  
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom: 20px; }
  .stat-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); }

  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; min-width: 800px; }
  th { padding:15px; text-align:left; background:var(--surface2); color:var(--muted); text-transform:uppercase; font-size:10px; }
  td { padding:15px; border-bottom:1px solid var(--border); }
  
  .badge { padding:4px 10px; border-radius:100px; font-size:10px; font-weight:700; }
  .badge-new { background: #4d9fff20; color: var(--new-color); }
  .badge-old { background: #f0b42920; color: var(--old-color); }
  .refresh-btn { background:var(--accent); color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; font-family: 'Syne'; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-area"><h1>Sales <span>Analysis</span></h1><p>Brand & Rep Performance</p></div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </header>

  <div id="loading" style="text-align:center; padding: 50px;"><p>Loading Data...</p></div>

  <div id="content" style="display:none;">
    <div class="analysis-section">
      <div class="analysis-card">
        <div class="analysis-title">Volume Per Brand</div>
        <div id="brand-list"></div>
      </div>
      
      <div>
        <div class="stats-grid">
          <div class="stat-card"><small>NEW CLIENTS</small><div id="c-new" style="font-size:32px; font-weight:800; color:var(--new-color)">0</div></div>
          <div class="stat-card"><small>OLD/EXISTING</small><div id="c-old" style="font-size:32px; font-weight:800; color:var(--old-color)">0</div></div>
        </div>
        <div class="team-grid" id="team-grid"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Date</th><th>Account</th><th>Location</th><th>Rep</th><th>Brands</th><th>Status</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUmRyHy1KPGfSfeIIJRhzwjU4DREEniTElvYe0-L9k8HtJXtXH56D2sNItV0aMivgBhQ/exec";
const TEAM = ["Mohamed Hamdy", "Mohamed Almech", "Mohamed Agha", "Munadel Yassine", "Yahya Aldaour"];

let rawData = [];
let selRep = 'All';

async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
    rawData = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
  } catch(e) { console.error(e); }
}

function render() {
  // Filter Data
  let filtered = selRep === 'All' ? rawData : rawData.filter(r => (r['Name']||'').trim() === selRep);

  // 1. Render Team Cards
  const grid = document.getElementById('team-grid');
  grid.innerHTML = `<div class="rep-card ${selRep==='All'?'active':''}" onclick="setRep('All')"><b>All</b></div>` + 
    TEAM.map(name => `<div class="rep-card ${selRep===name?'active':''}" onclick="setRep('${name}')"><b>${name.split(' ')[1] || name}</b></div>`).join('');

  // 2. Brand Analysis Logic
  const brandCounts = {};
  filtered.forEach(r => {
    const brands = (r['Brands'] || '').split(/[,&/]/); // Split by comma, & or /
    brands.forEach(b => {
      const name = b.trim();
      if(name && name !== '-') {
        brandCounts[name] = (brandCounts[name] || 0) + 1;
      }
    });
  });

  const sortedBrands = Object.entries(brandCounts).sort((a,b) => b[1] - a[1]);
  const maxVal = sortedBrands.length > 0 ? sortedBrands[0][1] : 1;
  
  document.getElementById('brand-list').innerHTML = sortedBrands.slice(0, 8).map(([name, count]) => `
    <div class="brand-row">
      <div class="brand-info"><span>${name}</span><span>${count}</span></div>
      <div class="brand-bar-bg"><div class="brand-bar-fill" style="width: ${(count/maxVal)*100}%"></div></div>
    </div>
  `).join('');

  // 3. Status Counters
  const counts = {new: 0, old: 0};
  filtered.forEach(r => {
    const s = (r['Client Status']||'').trim();
    if(s === 'New') counts.new++; else if(s === 'Old') counts.old++;
  });
  document.getElementById('c-new').innerText = counts.new;
  document.getElementById('c-old').innerText = counts.old;

  // 4. Table
  document.getElementById('tbody').innerHTML = filtered.map(r => `
    <tr>
      <td>${r['Timestamp'] ? new Date(r['Timestamp']).toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) : '-'}</td>
      <td style="font-weight:700;">${r['Account Name'] || '-'}</td>
      <td>${r['Location'] || '-'}</td>
      <td>${r['Name'] || '-'}</td>
      <td><small>${r['Brands'] || '-'}</small></td>
      <td><span class="badge ${r['Client Status']==='New'?'badge-new':'badge-old'}">${r['Client Status']}</span></td>
    </tr>
  `).join('');
}

function setRep(name) { selRep = name; render(); }
window.onload = loadData;
</script>
</body>
</html>
