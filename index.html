<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c23; --border: #ffffff0f;
    --accent: #ffb703; --text: #f0f2f7; --muted: #6b7280;
    --new-color: #4d9fff; --old-color: #f0b429;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .container { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:40px 24px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  .logo-area h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color: #fff; }
  .logo-area span { color: var(--accent); }
  
  #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:50vh; gap:20px; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .team-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:28px; }
  .rep-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition: 0.2s; position:relative; }
  .rep-card:hover { transform: translateY(-3px); background: var(--surface2); }
  .rep-card.active { border: 1px solid white; background: var(--surface2); }
  .rep-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; margin-bottom:5px; }

  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); cursor:pointer; transition: 0.2s; }
  .stat-card.active-filter { border-color: #fff; opacity: 1; }
  .stat-card:not(.active-filter) { opacity: 0.4; }
  
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; min-width: 800px; }
  th { padding:15px; text-align:left; background:var(--surface2); color:var(--muted); text-transform:uppercase; font-size:10px; }
  td { padding:15px; border-bottom:1px solid var(--border); }
  
  .badge { padding:4px 10px; border-radius:100px; font-size:10px; font-weight:700; display: inline-flex; align-items: center; gap: 5px; }
  .badge::before { content:''; width:6px; height:6px; border-radius:50%; background: currentColor; }
  .badge-new { background: #4d9fff20; color: var(--new-color); }
  .badge-old { background: #f0b42920; color: var(--old-color); }

  .refresh-btn { background:var(--accent); color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; font-family: 'Syne'; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-area"><h1>Sales <span>Pipeline</span></h1><p>Command Center</p></div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh Data</button>
  </header>

  <div id="loading"><div class="spinner"></div><p>Syncing Sheets...</p></div>

  <div id="content" style="display:none;">
    <div class="team-grid" id="team-grid"></div>

    <div class="stats-grid">
      <div class="stat-card active-filter" id="f-new" onclick="toggleStatus('New')">
        <small style="color:var(--muted)">NEW CLIENTS</small>
        <div id="c-new" style="font-size:42px; font-weight:800; color:var(--new-color)">0</div>
      </div>
      <div class="stat-card active-filter" id="f-old" onclick="toggleStatus('Old')">
        <small style="color:var(--muted)">OLD CLIENTS</small>
        <div id="c-old" style="font-size:42px; font-weight:800; color:var(--old-color)">0</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Account Name</th>
            <th>Location</th>
            <th>Rep Name</th>
            <th>Brands</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUmRyHy1KPGfSfeIIJRhzwjU4DREEniTElvYe0-L9k8HtJXtXH56D2sNItV0aMivgBhQ/exec";
const TEAM = ["Mohamed Hamdy", "Mohamed Almech", "Mohamed Agha", "Munadel Yassine", "Yahya Aldaour"];

let rawData = [];
let selRep = 'All';
let selStatus = ['New', 'Old'];

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('content').style.display = 'none';
  try {
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
    rawData = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
  } catch(e) { alert("Sync Error. Check Script Permissions."); }
}

function render() {
  // Team Cards
  const grid = document.getElementById('team-grid');
  grid.innerHTML = `<div class="rep-card ${selRep==='All'?'active':''}" onclick="filterRep('All')"><div class="rep-name">Full Team</div><small style="color:var(--muted)">${rawData.length} Total</small></div>` + 
    TEAM.map(name => {
      const count = rawData.filter(r => (r['Name']||'').trim() === name).length;
      return `<div class="rep-card ${selRep===name?'active':''}" onclick="filterRep('${name}')"><div class="rep-name">${name}</div><small style="color:var(--muted)">${count} Leads</small></div>`;
    }).join('');

  // Filter Logic
  let filtered = selRep === 'All' ? rawData : rawData.filter(r => (r['Name']||'').trim() === selRep);
  
  // Update Counters
  const counts = {new:0, old:0};
  filtered.forEach(r => {
    const s = (r['Client Status']||'').trim();
    if(s === 'New') counts.new++;
    else if(s === 'Old') counts.old++;
  });
  document.getElementById('c-new').innerText = counts.new;
  document.getElementById('c-old').innerText = counts.old;

  // Final Status Filter for Table
  let tableData = filtered.filter(r => selStatus.includes((r['Client Status']||'').trim()));

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = tableData.map(r => {
    const s = (r['Client Status'] || 'New').trim();
    const isNew = s === 'New';
    return `<tr>
      <td style="color:var(--accent)">${r['Timestamp'] ? new Date(r['Timestamp']).toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) : '-'}</td>
      <td style="font-weight:700;">${r['Account Name'] || '-'}</td>
      <td>${r['Location'] || '-'}</td>
      <td>${r['Name'] || '-'}</td>
      <td><small style="color:var(--muted)">${r['Brands'] || '-'}</small></td>
      <td><span class="badge ${isNew ? 'badge-new' : 'badge-old'}">${s}</span></td>
    </tr>`;
  }).join('');
}

function filterRep(name) { selRep = name; render(); }
function toggleStatus(s) {
  const i = selStatus.indexOf(s);
  if(i > -1) selStatus.splice(i, 1); else selStatus.push(s);
  document.getElementById('f-'+s.toLowerCase()).classList.toggle('active-filter');
  render();
}
window.onload = loadData;
</script>
</body>
</html>
